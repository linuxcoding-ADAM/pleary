<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مناضل 8 ماي 1945</title>
    <meta name="description" content="A historical game about the events of May 8, 1945 in Algeria" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: radial-gradient(ellipse at center, #1a0f05 0%, #0a0508 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Inter', Arial, sans-serif;
        overflow: hidden;
      }

      h1 {
        font-family: 'Cinzel', serif;
        font-size: 15px;
        color: rgba(210, 160, 60, 0.75);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      #game-container {
        border: 2px solid rgba(210, 160, 60, 0.45);
        box-shadow: 0 0 50px rgba(210, 160, 60, 0.18), 0 0 100px rgba(210, 160, 60, 0.08);
        border-radius: 3px;
        position: relative;
      }

      canvas { display: block; }

      /* Welcome Screen Styles */
      #welcome-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10, 5, 8, 0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        color: #f5e6c8;
      }
      #welcome-screen h2 {
        font-family: 'Arial', sans-serif;
        font-size: 38px;
        color: #d2a03c;
        margin-bottom: 15px;
        text-align: center;
        font-weight: bold;
      }
      #welcome-screen h1 {
        font-family: 'Arial', sans-serif;
        font-size: 20px;
        color: rgba(210, 160, 60, 0.8);
        margin-bottom: 40px;
        text-align: center;
        direction: rtl;
      }
      .input-group {
        margin-bottom: 40px;
        text-align: center;
      }
      .input-group input {
        padding: 12px 20px;
        font-size: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid #d2a03c;
        color: #fff;
        border-radius: 6px;
        outline: none;
        width: 300px;
        text-align: center;
        transition: border-color 0.2s, background 0.2s;
      }
      .input-group input:focus {
        background: rgba(255, 255, 255, 0.1);
        border-color: #f5e6c8;
      }
      .diff-buttons {
        display: flex;
        gap: 25px;
      }
      .diff-btn {
        background: transparent;
        border: 2px solid #d2a03c;
        color: #d2a03c;
        padding: 12px 30px;
        font-size: 18px;
        cursor: pointer;
        font-family: 'Arial', sans-serif;
        font-weight: bold;
        transition: all 0.2s ease-in-out;
      }
      .diff-btn:hover {
        background: rgba(210, 160, 60, 0.2);
        transform: translateY(-3px);
      }
      .diff-btn.easy { border-color: #2aff7a; color: #2aff7a; }
      .diff-btn.easy:hover { background: rgba(42, 255, 122, 0.2); }
      .diff-btn.pro { border-color: #d2a03c; color: #d2a03c; }
      .diff-btn.expert { border-color: #ff4444; color: #ff4444; }
      .diff-btn.expert:hover { background: rgba(255, 68, 68, 0.2); }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="welcome-screen">
        <h2>أدخل اسمك</h2>
        <h1>مناضل 8 ماي 1945 &mdash; الجزائر</h1>
        <div class="input-group">
          <input type="text" id="player-name" placeholder="الاسم..." autocomplete="off" dir="rtl" />
        </div>
        <div class="diff-buttons">
          <button class="diff-btn easy" data-diff="easy">سهل</button>
          <button class="diff-btn pro" data-diff="pro">متوسط</button>
          <button class="diff-btn expert" data-diff="expert">خبير</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
